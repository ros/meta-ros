header:
  version: 14

defaults:
  repos:
    branch: "whinlatter"

# https://downloads.yoctoproject.org/releases/yocto/yocto-5.3.3/RELEASENOTES
repos:
  openembedded-core:
    url: "https://github.com/openembedded/openembedded-core.git"
    commit: "ab57471acad7ce2a037480dc7b301104620f1ebf"
    path: "layers/openembedded-core"
    layers:
      meta:

  bitbake:
    url: "https://github.com/openembedded/bitbake.git"
    branch: "2.16"
    commit: "7af7e04f3adc8ba144d9e2e6b37ed4ddb3b59df0"
    path: "layers/bitbake"
    layers:
      bitbake: "disabled"

  meta-openembedded:
    url: "https://github.com/openembedded/meta-openembedded.git"
    commit: "d28d0a23615f4d91d125fdcd247a71245087dab3"
    path: "layers/meta-openembedded"
    layers:
      meta-filesystems:
      meta-gnome:
      meta-initramfs:
      meta-multimedia:
      meta-networking:
      meta-oe:
      meta-perl:
      meta-python:
      meta-webserver:
      meta-xfce:

local_conf_header:
  distro: |
    ERROR_QA:remove = "license-exists"
