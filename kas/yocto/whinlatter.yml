header:
  version: 14

defaults:
  repos:
    branch: "whinlatter"

# https://downloads.yoctoproject.org/releases/yocto/yocto-5.3.4/RELEASENOTES
repos:
  openembedded-core:
    url: "https://github.com/openembedded/openembedded-core.git"
    commit: "8751ec83421192fc0f8495fb95798f9eb7be77a0"
    path: "layers/openembedded-core"
    layers:
      meta:

  bitbake:
    url: "https://github.com/openembedded/bitbake.git"
    branch: "2.16"
    commit: "713fbbdb9ecc195ceb2216a2345e0d79dbee2135"
    path: "layers/bitbake"
    layers:
      bitbake: "disabled"

  meta-openembedded:
    url: "https://github.com/openembedded/meta-openembedded.git"
    commit: "f52f32952cb9717949f8bc3d3ccf6c4c5a59521f"
    path: "layers/meta-openembedded"
    layers:
      meta-filesystems:
      meta-gnome:
      meta-initramfs:
      meta-multimedia:
      meta-networking:
      meta-oe:
      meta-perl:
      meta-python:
      meta-webserver:
      meta-xfce:

local_conf_header:
  distro: |
    ERROR_QA:remove = "license-exists"
