header:
  version: 14
  includes:
    - kas/layer/clang-revival.yml

defaults:
  repos:
    branch: "scarthgap"

# https://downloads.yoctoproject.org/releases/yocto/yocto-5.0.16/RELEASENOTES
repos:
  openembedded-core:
    url: "https://github.com/openembedded/openembedded-core.git"
    commit: "a1f4ae4e569bc0e36c27c1e4651e502e54d63b28"
    path: "layers/openembedded-core"
    layers:
      meta:

  bitbake:
    url: "https://github.com/openembedded/bitbake.git"
    branch: "2.8"
    commit: "8dcf084522b9c66a6639b5f117f554fde9b6b45a"
    path: "layers/bitbake"
    layers:
      bitbake: "disabled"

  meta-openembedded:
    url: "https://github.com/openembedded/meta-openembedded.git"
    commit: "1ad0d777d1de1769e5995eb806f7ae5c15d0be54"
    path: "layers/meta-openembedded"
    layers:
      meta-filesystems:
      meta-gnome:
      meta-initramfs:
      meta-multimedia:
      meta-networking:
      meta-oe:
      meta-perl:
      meta-python:
      meta-webserver:
      meta-xfce:

local_conf_header:
  distro: |
    WARN_QA:remove = "license-exists"
