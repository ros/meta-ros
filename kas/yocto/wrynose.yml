header:
  version: 14

defaults:
  repos:
    branch: "wrynose"

# https://downloads.yoctoproject.org/releases/yocto/yocto-6.0.1/RELEASENOTES
repos:
  openembedded-core:
    url: "https://github.com/openembedded/openembedded-core.git"
    commit: "06dd66e6220e5ce4ed4b9af4d8231ae5f0a8ce80"
    path: "layers/openembedded-core"
    layers:
      meta:

  bitbake:
    url: "https://github.com/openembedded/bitbake.git"
    branch: "2.18"
    commit: "22021758e66737bcf68dfd2b74adc6a0cb1d42d9"
    path: "layers/bitbake"
    layers:
      bitbake: "disabled"

  meta-yocto:
    url: "https://git.yoctoproject.org/meta-yocto"
    commit: "8251bdad5fda780a000fb41e6eda82eadf0fa39e"
    path: "layers/meta-yocto"
    layers:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: "https://github.com/openembedded/meta-openembedded.git"
    commit: "100027977216601000cbefc42c2ff6cf667e7b5e"
    path: "layers/meta-openembedded"
    layers:
      meta-filesystems:
      meta-gnome:
      meta-initramfs:
      meta-multimedia:
      meta-networking:
      meta-oe:
      meta-perl:
      meta-python:
      meta-webserver:
      meta-xfce:

local_conf_header:
  distro: |
    ERROR_QA:remove = "license-exists"
